<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moseeker 流量监控面板</title>
  <style>
    :root {
      --bg: #f5f1ea;
      --bg-soft: #fbf8f3;
      --card: rgba(255, 255, 255, 0.84);
      --card-strong: rgba(255, 255, 255, 0.94);
      --line: rgba(130, 111, 86, 0.16);
      --line-strong: rgba(120, 97, 74, 0.24);
      --text: #24343b;
      --muted: #6f7d84;
      --blue: #4a7279;
      --teal: #7da295;
      --yellow: #c9a86d;
      --red: #c77767;
      --green: #7f9b72;
      --sand: #e9dcc7;
      --shadow: 0 24px 60px rgba(84, 66, 46, 0.08);
      --shadow-soft: 0 14px 34px rgba(72, 58, 43, 0.06);
      --radius: 22px;
      --radius-sm: 16px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(201, 168, 109, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(125, 162, 149, 0.2), transparent 32%),
        linear-gradient(180deg, #f9f6f1 0%, #f4efe7 48%, #f7f3ed 100%);
      color: var(--text);
      font-family: "Aptos", "Segoe UI Variable", "PingFang SC", "Microsoft YaHei", sans-serif;
      position: relative;
    }
    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      pointer-events: none;
      z-index: 0;
      border-radius: 999px;
      filter: blur(10px);
      opacity: 0.7;
    }
    body::before {
      width: 320px;
      height: 320px;
      top: 80px;
      right: -120px;
      background: radial-gradient(circle, rgba(199, 119, 103, 0.18), transparent 70%);
    }
    body::after {
      width: 280px;
      height: 280px;
      left: -80px;
      bottom: 40px;
      background: radial-gradient(circle, rgba(74, 114, 121, 0.16), transparent 70%);
    }
    .shell {
      max-width: 1680px;
      margin: 0 auto;
      padding: 34px 28px 52px;
      position: relative;
      z-index: 1;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 30px;
      background:
        linear-gradient(145deg, rgba(255,255,255,0.86), rgba(255,255,255,0.72)),
        linear-gradient(120deg, rgba(233,220,199,0.18), rgba(125,162,149,0.08));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    select, input, button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(123, 102, 79, 0.14);
      background: rgba(255, 255, 255, 0.92);
      padding: 12px 14px;
      font: inherit;
      color: var(--text);
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, background 180ms ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }
    select:focus, input:focus {
      outline: none;
      border-color: rgba(74, 114, 121, 0.42);
      box-shadow: 0 0 0 4px rgba(74, 114, 121, 0.1);
      background: #fff;
    }
    button {
      background: linear-gradient(135deg, #557c82 0%, #6f958b 100%);
      color: #fff;
      border: none;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 14px 28px rgba(74, 114, 121, 0.24);
      letter-spacing: 0.02em;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 30px rgba(74, 114, 121, 0.28);
    }
    button:active {
      transform: translateY(0);
    }
    button:disabled {
      opacity: 0.72;
      cursor: wait;
      transform: none;
    }
    .hint {
      grid-column: 1 / -1;
      font-size: 12px;
      color: var(--muted);
      padding: 6px 4px 2px;
      line-height: 1.8;
    }
    .section {
      margin-bottom: 38px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }
    .section-title::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--yellow), var(--teal));
      box-shadow: 0 0 0 6px rgba(201, 168, 109, 0.14);
    }
    .grid-two {
      display: grid;
      grid-template-columns: 1.35fr 0.95fr;
      gap: 20px;
    }
    .card, .table-card {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(255,255,255,0.8)),
        linear-gradient(145deg, rgba(233,220,199,0.12), rgba(125,162,149,0.08));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .card::before, .table-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 78px;
      background: linear-gradient(180deg, rgba(255,255,255,0.42), transparent);
      pointer-events: none;
    }
    .card {
      padding: 22px;
    }
    .big-card {
      min-height: 168px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .sub-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }
    .sub-grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    .metric-title {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 700;
    }
    .metric-value {
      font-size: 21px;
      font-weight: 800;
    }
    .metric-value.big {
      font-size: 48px;
      color: var(--blue);
      line-height: 0.96;
      letter-spacing: -0.03em;
    }
    .metric-foot {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 11px;
      color: var(--muted);
      margin-top: 18px;
      line-height: 1.5;
    }
    .delta.positive { color: var(--green); }
    .delta.negative { color: var(--red); }
    .chart-card {
      margin-top: 18px;
      padding: 20px 22px;
    }
    .chart-title {
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 14px;
    }
    .chart-box {
      min-height: 280px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(250,247,242,0.88)),
        radial-gradient(circle at top right, rgba(125,162,149,0.08), transparent 38%);
      border: 1px solid rgba(122, 104, 83, 0.12);
      overflow: hidden;
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
    }
    .table-card {
      padding: 22px;
    }
    .table-grid-three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 20px;
    }
    .table-head {
      margin-bottom: 18px;
      font-size: 15px;
      font-weight: 800;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
    }
    th, td {
      padding: 15px 12px;
      border-bottom: 1px solid rgba(122, 104, 83, 0.12);
      font-size: 13px;
      text-align: left;
      vertical-align: middle;
      line-height: 1.65;
    }
    tbody tr:nth-child(odd) {
      background: rgba(247, 242, 234, 0.34);
    }
    tbody tr:hover {
      background: rgba(125, 162, 149, 0.1);
    }
    th {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
      white-space: nowrap;
      background: rgba(249, 245, 239, 0.88);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(74, 114, 121, 0.1);
      color: var(--blue);
      font-size: 11px;
      letter-spacing: 0.04em;
      font-weight: 700;
    }
    .status-success {
      color: var(--green);
      font-weight: 700;
    }
    .status-failure {
      color: var(--red);
      font-weight: 700;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 28px;
      line-height: 1.85;
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      padding-right: 4px;
      line-height: 1.7;
    }
    @media (max-width: 1280px) {
      .toolbar { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .grid-two { grid-template-columns: 1fr; }
      .table-grid-three { grid-template-columns: 1fr; }
      .sub-grid.three { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .shell { padding: 22px 16px 34px; }
      .toolbar, .sub-grid, .sub-grid.three { grid-template-columns: 1fr; }
      .metric-value.big { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="toolbar">
      <div>
        <label for="customerName">客户</label>
        <select id="customerName"></select>
      </div>
      <div>
        <label for="host">Host</label>
        <select id="host"></select>
      </div>
      <div>
        <label for="rangePreset">时间范围</label>
        <select id="rangePreset">
          <option value="7">最近 7 天</option>
          <option value="14" selected>最近 14 天</option>
          <option value="30">最近 30 天</option>
          <option value="custom">自定义</option>
        </select>
      </div>
      <div>
        <label for="dateFrom">开始日期</label>
        <input id="dateFrom" type="date" />
      </div>
      <div>
        <label for="dateTo">结束日期</label>
        <input id="dateTo" type="date" />
      </div>
      <div>
        <label for="topBots">Top Bots</label>
        <select id="topBots">
          <option>3</option>
          <option>5</option>
          <option selected>10</option>
          <option>20</option>
        </select>
      </div>
      <div>
        <label for="topPages">Top Pages</label>
        <select id="topPages">
          <option>3</option>
          <option>5</option>
          <option selected>10</option>
          <option>20</option>
        </select>
      </div>
      <div class="hint">当前面板按最新口径展示：总用户流量、AI Referred 人类流量拆分、三类 AI Bot 流量，以及客户网页 AI 流量排行。SEO Bot、静态资源与可疑探测不计入主面板聚焦统计。</div>
      <div style="grid-column: 1 / -1;">
        <button id="refreshBtn">刷新面板</button>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">用户流量</h2>
      <div class="grid-two">
        <div>
          <div class="card big-card" id="humanBigCard"></div>
          <div class="sub-grid three" id="humanSubCards"></div>
        </div>
        <div class="card">
          <div class="table-head">AI Referred 拆分</div>
          <div class="chart-box" id="humanComposition"></div>
        </div>
      </div>
      <div class="card chart-card">
        <div class="chart-title">用户流量趋势</div>
        <div class="chart-box" id="humanTrend"></div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">AI Bot 流量</h2>
      <div class="grid-two">
        <div>
          <div class="card big-card" id="aiBigCard"></div>
          <div class="sub-grid three" id="aiSubCards"></div>
        </div>
        <div class="card">
          <div class="table-head">AI 流量构成</div>
          <div class="chart-box" id="aiComposition"></div>
        </div>
      </div>
      <div class="card chart-card">
        <div class="chart-title">AI 流量趋势</div>
        <div class="chart-box" id="aiTrend"></div>
      </div>
    </section>

    <section class="section">
      <div class="table-grid-three">
        <div class="table-card">
          <div class="table-head">AI Search 平台排行</div>
          <div id="aiSearchRanking"></div>
        </div>
        <div class="table-card">
          <div class="table-head">AI Training 平台排行</div>
          <div id="aiTrainingRanking"></div>
        </div>
        <div class="table-card">
          <div class="table-head">AI Index 平台排行</div>
          <div id="aiIndexRanking"></div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="table-card">
        <div class="table-head">客户网页 AI 流量排行</div>
        <div id="pageRanking"></div>
      </div>
    </section>

    <section class="section">
      <div class="table-card">
        <div class="table-head">访问记录</div>
        <div id="accessRecords"></div>
      </div>
    </section>

    <div class="footer" id="footerText">加载中...</div>
  </div>

  <script>
    const el = {
      customerName: document.getElementById('customerName'),
      host: document.getElementById('host'),
      rangePreset: document.getElementById('rangePreset'),
      dateFrom: document.getElementById('dateFrom'),
      dateTo: document.getElementById('dateTo'),
      topBots: document.getElementById('topBots'),
      topPages: document.getElementById('topPages'),
      refreshBtn: document.getElementById('refreshBtn'),
      humanBigCard: document.getElementById('humanBigCard'),
      humanSubCards: document.getElementById('humanSubCards'),
      humanComposition: document.getElementById('humanComposition'),
      humanTrend: document.getElementById('humanTrend'),
      aiBigCard: document.getElementById('aiBigCard'),
      aiSubCards: document.getElementById('aiSubCards'),
      aiComposition: document.getElementById('aiComposition'),
      aiTrend: document.getElementById('aiTrend'),
      aiSearchRanking: document.getElementById('aiSearchRanking'),
      aiTrainingRanking: document.getElementById('aiTrainingRanking'),
      aiIndexRanking: document.getElementById('aiIndexRanking'),
      pageRanking: document.getElementById('pageRanking'),
      accessRecords: document.getElementById('accessRecords'),
      footerText: document.getElementById('footerText'),
    };

    const colors = {
      total: '#4a7279',
      humanAi: '#7da295',
      humanTraditional: '#c9a86d',
      humanPlatform: '#b98f73',
      humanDirect: '#96a3a8',
      aiSearch: '#7da295',
      aiTraining: '#c9a86d',
      aiIndex: '#c77767',
      grid: '#e8ddd0',
      text: '#24343b'
    };

    function fmt(v) {
      return new Intl.NumberFormat('en-US').format(Number(v || 0));
    }

    function pct(part, total) {
      if (!total) return '0.0%';
      return ((Number(part || 0) / Number(total)) * 100).toFixed(1) + '%';
    }

    function deltaText(value) {
      if (value == null) return '<span class="delta">N/A</span>';
      const cls = Number(value) >= 0 ? 'positive' : 'negative';
      const arrow = Number(value) >= 0 ? '▲' : '▼';
      return `<span class="delta ${cls}">${arrow} ${Math.abs(Number(value)).toFixed(1)}%</span>`;
    }

    function daysAgo(dateStr, delta) {
      const d = new Date(dateStr + 'T00:00:00');
      d.setDate(d.getDate() - delta);
      return d.toISOString().slice(0, 10);
    }

    async function getJSON(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    function setSelectOptions(selectEl, options, preferredValue, fallbackValue = 'ALL') {
      selectEl.innerHTML = options.map(item => `<option value="${item.value}" title="${item.label || item.value}">${item.label || item.value}</option>`).join('');
      const values = new Set(options.map(item => item.value));
      if (preferredValue && values.has(preferredValue)) {
        selectEl.value = preferredValue;
        return;
      }
      if (values.has(fallbackValue)) {
        selectEl.value = fallbackValue;
        return;
      }
      if (options.length > 0) {
        selectEl.value = options[0].value;
      }
    }

    function renderBigCard(container, title, value, compareText, ratioText, color = colors.total) {
      container.innerHTML = `
        <div>
          <div class="metric-title">${title}</div>
          <div class="metric-value big" style="color:${color}">${fmt(value)}</div>
        </div>
        <div class="metric-foot">
          <span>vs. Prior Period <strong>${compareText}</strong></span>
          <span>Ratio <strong>${ratioText}</strong></span>
        </div>
      `;
    }

    function renderMiniCards(container, items) {
      container.innerHTML = items.map(item => `
        <div class="card">
          <div class="metric-title">${item.title}</div>
          <div class="metric-value">${fmt(item.value)}</div>
          <div class="metric-foot">
            <span>vs. Prior Period <strong>${item.delta}</strong></span>
            <span>Ratio <strong>${item.ratio}</strong></span>
          </div>
        </div>
      `).join('');
    }

    function renderDonut(container, rows, palette) {
      const total = rows.reduce((sum, row) => sum + Number(row.value || 0), 0);
      if (!total) {
        container.innerHTML = '<div class="empty">暂无数据</div>';
        return;
      }
      const size = 260;
      const r = 72;
      const cx = 110;
      const cy = 110;
      let start = -90;
      const segments = rows.map((row, idx) => {
        const val = Number(row.value || 0);
        const angle = total === 0 ? 0 : (val / total) * 360;
        const end = start + angle;
        const large = angle > 180 ? 1 : 0;
        const x1 = cx + r * Math.cos(Math.PI * start / 180);
        const y1 = cy + r * Math.sin(Math.PI * start / 180);
        const x2 = cx + r * Math.cos(Math.PI * end / 180);
        const y2 = cy + r * Math.sin(Math.PI * end / 180);
        const path = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
        start = end;
        return `<path d="${path}" fill="none" stroke="${palette[idx % palette.length]}" stroke-width="26" stroke-linecap="round"></path>`;
      }).join('');
      const legend = rows.map((row, idx) => `
        <div style="display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:6px 0;">
          <span style="display:flex;align-items:center;gap:8px;"><span style="width:8px;height:8px;border-radius:999px;background:${palette[idx % palette.length]};display:inline-block;"></span>${row.label}</span>
          <strong>${fmt(row.value)}</strong>
        </div>
      `).join('');
      container.innerHTML = `
        <div style="display:grid;grid-template-columns: 220px 1fr; gap: 16px; align-items:center;">
          <svg viewBox="0 0 220 220" width="100%" height="220">
            <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eef3f8" stroke-width="26"></circle>
            ${segments}
            <text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="14" fill="#7a8797">总量</text>
            <text x="${cx}" y="${cy+20}" text-anchor="middle" font-size="28" font-weight="800" fill="#1f2a37">${fmt(total)}</text>
          </svg>
          <div>${legend}</div>
        </div>
      `;
    }

    function renderTrend(container, rows, config) {
      if (!rows || rows.length === 0) {
        container.innerHTML = '<div class="empty">暂无趋势数据</div>';
        return;
      }
      const width = Math.max(container.clientWidth - 16, 560);
      const height = 280;
      const pad = { top: 16, right: 20, bottom: 34, left: 54 };
      const plotW = width - pad.left - pad.right;
      const plotH = height - pad.top - pad.bottom;
      const maxY = Math.max(...rows.flatMap(r => config.series.map(s => Number(r[s.key] || 0))), 1);
      const xStep = rows.length > 1 ? plotW / (rows.length - 1) : 0;

      const line = (key) => rows.map((row, idx) => {
        const x = pad.left + idx * xStep;
        const y = pad.top + plotH - (Number(row[key] || 0) / maxY) * plotH;
        return `${idx === 0 ? 'M' : 'L'} ${x.toFixed(2)} ${y.toFixed(2)}`;
      }).join(' ');

      const xLabels = rows.map((row, idx) => {
        const x = pad.left + idx * xStep;
        return `<text x="${x}" y="${height - 10}" font-size="11" text-anchor="middle" fill="#7a8797">${row.date.slice(5)}</text>`;
      }).join('');

      const grid = Array.from({ length: 5 }, (_, idx) => {
        const val = (maxY / 4) * idx;
        const y = pad.top + plotH - (val / maxY) * plotH;
        return `
          <line x1="${pad.left}" y1="${y}" x2="${width - pad.right}" y2="${y}" stroke="${colors.grid}" />
          <text x="${pad.left - 10}" y="${y + 4}" text-anchor="end" font-size="11" fill="#7a8797">${fmt(Math.round(val))}</text>
        `;
      }).join('');

      const paths = config.series.map(s => `<path d="${line(s.key)}" fill="none" stroke="${s.color}" stroke-width="3" stroke-linecap="round"></path>`).join('');
      const legend = config.series.map(s => `<span style="display:inline-flex;align-items:center;gap:6px;margin-left:14px;"><span style="width:8px;height:8px;border-radius:999px;background:${s.color};display:inline-block;"></span>${s.label}</span>`).join('');

      container.innerHTML = `
        <div style="text-align:right;font-size:12px;color:#7a8797;padding:0 8px 8px;">${legend}</div>
        <svg viewBox="0 0 ${width} ${height}" width="100%" height="${height}">
          ${grid}
          ${paths}
          ${xLabels}
        </svg>
      `;
    }

    function renderTable(container, columns, rows, emptyText) {
      if (!rows || rows.length === 0) {
        container.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }
      const head = columns.map(col => `<th>${col.label}</th>`).join('');
      const body = rows.map(row => `<tr>${columns.map(col => `<td>${col.render ? col.render(row[col.key], row) : (row[col.key] ?? '')}</td>`).join('')}</tr>`).join('');
      container.innerHTML = `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    async function loadFilters() {
      const params = new URLSearchParams();
      if (el.customerName.value && el.customerName.value !== 'ALL') params.set('customer_name', el.customerName.value);
      if (el.dateFrom.value) params.set('date_from', el.dateFrom.value);
      if (el.dateTo.value) params.set('date_to', el.dateTo.value);
      const payload = await getJSON(`/frontend/filters${params.toString() ? `?${params.toString()}` : ''}`);
      const customers = payload.customers || [];
      const hosts = payload.hosts || [];
      setSelectOptions(el.customerName, customers, el.customerName.value || payload.defaults?.customer_name || 'ALL');
      setSelectOptions(el.host, hosts, el.host.value || payload.defaults?.host || 'ALL');
      if (payload.defaults?.date_from) el.dateFrom.value = payload.defaults.date_from;
      if (payload.defaults?.date_to) el.dateTo.value = payload.defaults.date_to;
    }

    function showIdleState(message = '已更新筛选条件，点击“刷新面板”后查看最新结果') {
      const idle = `<div class="empty">${message}</div>`;
      el.humanTrend.innerHTML = idle;
      el.aiTrend.innerHTML = idle;
      el.aiSearchRanking.innerHTML = idle;
      el.aiTrainingRanking.innerHTML = idle;
      el.aiIndexRanking.innerHTML = idle;
      el.pageRanking.innerHTML = idle;
      el.accessRecords.innerHTML = idle;
      el.humanBigCard.innerHTML = idle;
      el.humanSubCards.innerHTML = '';
      el.humanComposition.innerHTML = idle;
      el.aiBigCard.innerHTML = idle;
      el.aiSubCards.innerHTML = '';
      el.aiComposition.innerHTML = idle;
      el.footerText.textContent = message;
    }

    function applyPreset() {
      if (el.rangePreset.value === 'custom') return;
      const end = el.dateTo.value || new Date().toISOString().slice(0, 10);
      el.dateTo.value = end;
      el.dateFrom.value = daysAgo(end, Number(el.rangePreset.value) - 1);
    }

    function prevDelta(current, previous) {
      if (!previous && current) return '100%';
      if (!previous) return '0%';
      return (((current - previous) / previous) * 100).toFixed(1) + '%';
    }

    function splitPrevious(series) {
      if (series.length < 2) return { current: series, previous: [] };
      const mid = Math.floor(series.length / 2);
      return { previous: series.slice(0, mid), current: series.slice(mid) };
    }

    async function loadDashboard() {
      applyPreset();
      el.refreshBtn.disabled = true;
      el.refreshBtn.textContent = '加载中...';
      try {
        const params = new URLSearchParams({
          customer_name: el.customerName.value || 'ALL',
          host: el.host.value || 'ALL',
          date_from: el.dateFrom.value,
          date_to: el.dateTo.value,
          top_bots: el.topBots.value,
          top_pages: el.topPages.value
        });
        const data = await getJSON(`/frontend/dashboard?${params.toString()}`);
        const human = data.human_summary || {};
        const humanReferred = data.human_referred_summary || {};
        const ai = data.ai_summary || {};
        const humanSplit = splitPrevious(data.human_trend || []);
        const aiSplit = splitPrevious(data.ai_trend || []);
        const humanReferredSplit = splitPrevious(data.human_referred_trend || []);
        const humanPrevTotal = humanSplit.previous.reduce((s, r) => s + Number(r.total_human_traffic || 0), 0);
        const aiPrevTotal = aiSplit.previous.reduce((s, r) => s + Number(r.total_ai_traffic || 0), 0);
        const humanReferredPrevTotal = humanReferredSplit.previous.reduce((s, r) => s + Number(r.total_ai_referred_human_traffic || 0), 0);

        renderBigCard(
          el.humanBigCard,
          '总用户流量',
          human.total_human_traffic || 0,
          deltaText(prevDelta(Number(human.total_human_traffic || 0), humanPrevTotal)),
          '100%'
        );
        renderMiniCards(el.humanSubCards, [
          {
            title: 'AI Referred',
            value: humanReferred.total_ai_referred_human_traffic || 0,
            delta: deltaText(prevDelta(Number(humanReferred.total_ai_referred_human_traffic || 0), humanReferredPrevTotal)),
            ratio: pct(humanReferred.total_ai_referred_human_traffic, human.total_human_traffic)
          },
          {
            title: '传统渠道',
            value: human.human_traditional_channel || 0,
            delta: deltaText(prevDelta(Number(human.human_traditional_channel || 0), humanSplit.previous.reduce((s, r) => s + Number(r.human_traditional_channel || 0), 0))),
            ratio: pct(human.human_traditional_channel, human.total_human_traffic)
          },
          {
            title: '平台+直接',
            value: human.human_platform_combined_channel || 0,
            delta: deltaText(prevDelta(Number(human.human_platform_combined_channel || 0), humanSplit.previous.reduce((s, r) => s + Number(r.human_platform_combined_channel || 0), 0))),
            ratio: pct(human.human_platform_combined_channel, human.total_human_traffic)
          }
        ]);
        renderDonut(el.humanComposition, [
          { label: 'ChatGPT', value: humanReferred.chatgpt || 0 },
          { label: 'Perplexity', value: humanReferred.perplexity || 0 },
          { label: '其它 AI 引荐', value: humanReferred.other_ai_referred || 0 }
        ], [colors.humanAi, colors.humanTraditional, colors.humanPlatform]);
        renderTrend(el.humanTrend, data.human_trend || [], {
          series: [
            { key: 'total_human_traffic', label: '总用户流量', color: colors.total },
            { key: 'human_ai_channel', label: 'AI Referred', color: colors.humanAi },
            { key: 'human_traditional_channel', label: '传统渠道', color: colors.humanTraditional },
            { key: 'human_platform_combined_channel', label: '平台+直接', color: colors.humanPlatform }
          ]
        });

        renderBigCard(
          el.aiBigCard,
          '总 AI 流量',
          ai.total_ai_traffic || 0,
          deltaText(prevDelta(Number(ai.total_ai_traffic || 0), aiPrevTotal)),
          '100%',
          colors.total
        );
        renderMiniCards(el.aiSubCards, [
          {
            title: 'AI Search',
            value: ai.ai_search || 0,
            delta: deltaText(prevDelta(Number(ai.ai_search || 0), aiSplit.previous.reduce((s, r) => s + Number(r.ai_search || 0), 0))),
            ratio: pct(ai.ai_search, ai.total_ai_traffic)
          },
          {
            title: 'AI Training',
            value: ai.ai_training || 0,
            delta: deltaText(prevDelta(Number(ai.ai_training || 0), aiSplit.previous.reduce((s, r) => s + Number(r.ai_training || 0), 0))),
            ratio: pct(ai.ai_training, ai.total_ai_traffic)
          },
          {
            title: 'AI Index',
            value: ai.ai_index || 0,
            delta: deltaText(prevDelta(Number(ai.ai_index || 0), aiSplit.previous.reduce((s, r) => s + Number(r.ai_index || 0), 0))),
            ratio: pct(ai.ai_index, ai.total_ai_traffic)
          }
        ]);
        renderDonut(el.aiComposition, [
          { label: 'AI Search', value: ai.ai_search || 0 },
          { label: 'AI Training', value: ai.ai_training || 0 },
          { label: 'AI Index', value: ai.ai_index || 0 }
        ], [colors.aiSearch, colors.aiTraining, colors.aiIndex]);
        renderTrend(el.aiTrend, data.ai_trend || [], {
          series: [
            { key: 'total_ai_traffic', label: '总 AI 流量', color: colors.total },
            { key: 'ai_search', label: 'AI Search', color: colors.aiSearch },
            { key: 'ai_training', label: 'AI Training', color: colors.aiTraining },
            { key: 'ai_index', label: 'AI Index', color: colors.aiIndex }
          ]
        });

        const rankings = data.ai_category_rankings || {};
        const rankingColumns = [
          { key: 'platform', label: '平台 / Bot' },
          { key: 'requests', label: '流量', render: (v) => fmt(v) }
        ];
        renderTable(el.aiSearchRanking, rankingColumns, rankings.ai_search || [], '暂无 AI Search 平台数据');
        renderTable(el.aiTrainingRanking, rankingColumns, rankings.ai_training || [], '暂无 AI Training 平台数据');
        renderTable(el.aiIndexRanking, rankingColumns, rankings.ai_index || [], '暂无 AI Index 平台数据');

        renderTable(el.pageRanking, [
          { key: 'page', label: '页面' },
          { key: 'ai_requests', label: '总 AI 流量', render: (v) => fmt(v) },
          { key: 'ai_search', label: 'AI Search', render: (v) => fmt(v) },
          { key: 'ai_training', label: 'AI Training', render: (v) => fmt(v) },
          { key: 'ai_index', label: 'AI Index', render: (v) => fmt(v) }
        ], data.page_ranking || [], '暂无页面排行数据');

        renderTable(el.accessRecords, [
          { key: 'access_time', label: '访问时间' },
          { key: 'traffic_type', label: '流量类型', render: (v) => `<span class="badge">${v === 'ai' ? 'AI 流量' : '用户流量'}</span>` },
          { key: 'traffic_channel', label: '流量渠道' },
          { key: 'webpage', label: '页面' },
          { key: 'access_status', label: '访问状态', render: (v) => `<span class="${String(v).toLowerCase() === 'success' ? 'status-success' : 'status-failure'}">${v === 'Success' ? '成功' : '失败'}</span>` }
        ], data.access_records || [], '暂无访问记录');

        el.footerText.textContent = `客户=${data.meta?.customer_name || 'ALL'} | Host=${data.meta?.host || 'ALL'} | 时间范围=${data.meta?.date_from || '-'} ~ ${data.meta?.date_to || '-'} | Top Bots=${data.meta?.top_bots || '-'} | Top Pages=${data.meta?.top_pages || '-'} | 当前按总用户流量 + AI Referred 拆分 + AI Bot + AI 页面排行口径展示`;
      } catch (error) {
        el.humanTrend.innerHTML = `<div class="empty">加载失败：${error.message}</div>`;
        el.aiTrend.innerHTML = `<div class="empty">加载失败：${error.message}</div>`;
        el.aiSearchRanking.innerHTML = `<div class="empty">加载失败</div>`;
        el.aiTrainingRanking.innerHTML = `<div class="empty">加载失败</div>`;
        el.aiIndexRanking.innerHTML = `<div class="empty">加载失败</div>`;
        el.pageRanking.innerHTML = `<div class="empty">加载失败</div>`;
        el.accessRecords.innerHTML = `<div class="empty">加载失败</div>`;
      } finally {
        el.refreshBtn.disabled = false;
        el.refreshBtn.textContent = '刷新面板';
      }
    }

    const refreshFilterOptionsOnly = async () => {
      applyPreset();
      await loadFilters();
      showIdleState();
    };
    el.customerName.addEventListener('change', refreshFilterOptionsOnly);
    el.host.addEventListener('change', () => showIdleState());
    el.rangePreset.addEventListener('change', refreshFilterOptionsOnly);
    el.dateFrom.addEventListener('change', refreshFilterOptionsOnly);
    el.dateTo.addEventListener('change', refreshFilterOptionsOnly);
    el.topBots.addEventListener('change', () => showIdleState());
    el.topPages.addEventListener('change', () => showIdleState());
    el.refreshBtn.addEventListener('click', async () => {
      applyPreset();
      await loadFilters();
      await loadDashboard();
    });

    (async function init() {
      await loadFilters();
      applyPreset();
      showIdleState('筛选项已就绪，点击“刷新面板”开始加载数据');
    })();
  </script>
</body>
</html>
